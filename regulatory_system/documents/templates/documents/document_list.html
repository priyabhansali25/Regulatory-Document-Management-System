<!DOCTYPE html>
<html>
<head>
    <title>Documents</title>
</head>
<body>

    <h1>Documents List</h1>

    {% if documents %}
        <ul>
            {% for doc in documents %}
                <li>
                    <strong>{{ doc.title }}</strong> 
                    ({{ doc.document_type }})
                    <br>

                    {% if doc.file %}
                        <a href="{{ doc.file.url }}" target="_blank">
                            View File
                        </a>
                    {% else %}
                        <span>No file uploaded</span>
                    {% endif %}
                </li>
                <br>
            {% endfor %}
        </ul>
    {% else %}
        <p>No documents available</p>
    {% endif %}

</body>
</html>
